<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rav Doctolero | Superhero Hero</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #09090b;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-family: 'Space Grotesk', sans-serif;
    }

    .superhero-scene {
      position: relative;
      width: 800px;
      height: 800px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* === BACKGROUND ENERGY FIELD === */
    .energy-field {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background:
        radial-gradient(circle at 50% 50%, rgba(59, 130, 246, 0.12) 0%, transparent 50%),
        radial-gradient(circle at 30% 40%, rgba(139, 92, 246, 0.08) 0%, transparent 40%),
        radial-gradient(circle at 70% 60%, rgba(34, 197, 94, 0.06) 0%, transparent 40%);
      animation: pulse-field 4s ease-in-out infinite;
    }

    @keyframes pulse-field {
      0%, 100% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(1.05); opacity: 1; }
    }

    /* === ROTATING RINGS === */
    .orbit-ring {
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(59, 130, 246, 0.1);
    }

    .orbit-ring-1 {
      width: 400px; height: 400px;
      animation: spin-slow 30s linear infinite;
    }
    .orbit-ring-2 {
      width: 540px; height: 540px;
      animation: spin-slow 45s linear infinite reverse;
      border-color: rgba(139, 92, 246, 0.08);
    }
    .orbit-ring-3 {
      width: 680px; height: 680px;
      animation: spin-slow 60s linear infinite;
      border-color: rgba(34, 197, 94, 0.06);
    }

    @keyframes spin-slow {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* === ENERGY BEAMS (SVG lines from center to niches) === */
    .energy-beams {
      position: absolute;
      width: 800px; height: 800px;
      pointer-events: none;
    }

    .beam {
      stroke-dasharray: 8 12;
      animation: dash-flow 2s linear infinite;
    }

    @keyframes dash-flow {
      to { stroke-dashoffset: -40; }
    }

    /* === PHOTO CONTAINER === */
    .hero-photo-wrap {
      position: relative;
      z-index: 10;
      width: 220px;
      height: 220px;
    }

    .hero-photo-glow {
      position: absolute;
      inset: -20px;
      border-radius: 50%;
      background: conic-gradient(
        from 0deg,
        rgba(59, 130, 246, 0.4),
        rgba(139, 92, 246, 0.4),
        rgba(236, 72, 153, 0.3),
        rgba(34, 197, 94, 0.3),
        rgba(59, 130, 246, 0.4)
      );
      animation: glow-spin 6s linear infinite;
      filter: blur(15px);
    }

    @keyframes glow-spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .hero-photo-ring {
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      background: conic-gradient(
        from 0deg,
        #3b82f6,
        #8b5cf6,
        #ec4899,
        #22c55e,
        #3b82f6
      );
      animation: glow-spin 4s linear infinite;
    }

    .hero-photo {
      position: relative;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      object-fit: cover;
      object-position: center top;
      border: 4px solid #09090b;
      display: block;
      z-index: 2;
    }

    /* === CAPE / ENERGY TRAIL === */
    .cape-energy {
      position: absolute;
      bottom: -60px;
      left: 50%;
      transform: translateX(-50%);
      width: 300px;
      height: 200px;
      z-index: 5;
      pointer-events: none;
    }

    .cape-streak {
      position: absolute;
      border-radius: 50%;
      filter: blur(30px);
      animation: cape-flow 3s ease-in-out infinite;
    }

    .cape-streak-1 {
      width: 200px; height: 80px;
      background: rgba(59, 130, 246, 0.15);
      left: 50px; top: 20px;
    }
    .cape-streak-2 {
      width: 160px; height: 60px;
      background: rgba(139, 92, 246, 0.12);
      left: 80px; top: 50px;
      animation-delay: 0.5s;
    }
    .cape-streak-3 {
      width: 120px; height: 50px;
      background: rgba(236, 72, 153, 0.1);
      left: 100px; top: 80px;
      animation-delay: 1s;
    }

    @keyframes cape-flow {
      0%, 100% { transform: translateY(0) scaleX(1); opacity: 0.8; }
      50% { transform: translateY(10px) scaleX(1.1); opacity: 1; }
    }

    /* === FLOATING NICHE CARDS === */
    .niche {
      position: absolute;
      z-index: 20;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 18px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(20px);
      color: #fafafa;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      white-space: nowrap;
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .niche:hover {
      transform: scale(1.08) !important;
      box-shadow: 0 8px 40px rgba(59, 130, 246, 0.2);
    }

    .niche-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    /* Individual niche positions and animations */
    .niche-video {
      top: 60px; left: 50%; transform: translateX(-50%);
      animation: float-y 5s ease-in-out infinite;
    }
    .niche-video .niche-icon { background: rgba(239, 68, 68, 0.15); }

    .niche-ai {
      top: 160px; right: 20px;
      animation: float-xy 6s ease-in-out infinite;
    }
    .niche-ai .niche-icon { background: rgba(139, 92, 246, 0.15); }

    .niche-automation {
      top: 50%; right: 0; transform: translateY(-50%);
      animation: float-x 5.5s ease-in-out infinite;
    }
    .niche-automation .niche-icon { background: rgba(34, 197, 94, 0.15); }

    .niche-smm {
      bottom: 160px; right: 30px;
      animation: float-xy 5s ease-in-out infinite reverse;
    }
    .niche-smm .niche-icon { background: rgba(59, 130, 246, 0.15); }

    .niche-seo {
      bottom: 60px; left: 50%; transform: translateX(-50%);
      animation: float-y 6s ease-in-out infinite reverse;
    }
    .niche-seo .niche-icon { background: rgba(245, 158, 11, 0.15); }

    .niche-design {
      bottom: 160px; left: 20px;
      animation: float-xy 5.5s ease-in-out infinite;
      animation-delay: 1s;
    }
    .niche-design .niche-icon { background: rgba(236, 72, 153, 0.15); }

    .niche-product {
      top: 50%; left: 0; transform: translateY(-50%);
      animation: float-x 6s ease-in-out infinite reverse;
    }
    .niche-product .niche-icon { background: rgba(6, 182, 212, 0.15); }

    @keyframes float-y {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }

    @keyframes float-x {
      0%, 100% { transform: translateX(0) translateY(-50%); }
      50% { transform: translateX(8px) translateY(-50%); }
    }

    @keyframes float-xy {
      0%, 100% { transform: translate(0, 0); }
      33% { transform: translate(6px, -8px); }
      66% { transform: translate(-4px, -4px); }
    }

    /* === PARTICLE DOTS === */
    .particles {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .particle {
      position: absolute;
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: rgba(59, 130, 246, 0.5);
      animation: particle-drift 8s linear infinite;
    }

    .particle:nth-child(2) { left: 15%; top: 20%; animation-delay: 1s; background: rgba(139, 92, 246, 0.4); animation-duration: 10s; }
    .particle:nth-child(3) { left: 80%; top: 30%; animation-delay: 2s; background: rgba(34, 197, 94, 0.4); animation-duration: 7s; }
    .particle:nth-child(4) { left: 25%; top: 70%; animation-delay: 3s; background: rgba(236, 72, 153, 0.4); animation-duration: 9s; }
    .particle:nth-child(5) { left: 70%; top: 75%; animation-delay: 0.5s; background: rgba(245, 158, 11, 0.4); animation-duration: 11s; }
    .particle:nth-child(6) { left: 45%; top: 15%; animation-delay: 4s; background: rgba(59, 130, 246, 0.3); animation-duration: 8s; }
    .particle:nth-child(7) { left: 90%; top: 50%; animation-delay: 2.5s; background: rgba(6, 182, 212, 0.4); animation-duration: 9s; }
    .particle:nth-child(8) { left: 10%; top: 50%; animation-delay: 1.5s; background: rgba(139, 92, 246, 0.3); animation-duration: 12s; }
    .particle:nth-child(9) { left: 60%; top: 10%; animation-delay: 3.5s; background: rgba(34, 197, 94, 0.3); animation-duration: 7.5s; }
    .particle:nth-child(10) { left: 35%; top: 85%; animation-delay: 0.8s; background: rgba(239, 68, 68, 0.3); animation-duration: 10s; }
    .particle:nth-child(11) { left: 55%; top: 90%; animation-delay: 2.2s; background: rgba(59, 130, 246, 0.3); animation-duration: 8.5s; }
    .particle:nth-child(12) { left: 5%; top: 35%; animation-delay: 4.5s; background: rgba(236, 72, 153, 0.3); animation-duration: 11s; }

    @keyframes particle-drift {
      0% { transform: translateY(0) scale(1); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(-80px) scale(0); opacity: 0; }
    }

    /* === TITLE BELOW === */
    .hero-title-block {
      position: absolute;
      bottom: -20px;
      text-align: center;
      z-index: 20;
    }

    .hero-name {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -0.01em;
      background: linear-gradient(135deg, #fff, #e4e4e7, #a1a1aa, #e4e4e7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .hero-tagline {
      font-size: 0.9rem;
      color: #71717a;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-top: 4px;
    }

    /* === SVG ICONS inside niche-icon === */
    .niche-icon svg {
      width: 20px;
      height: 20px;
    }

    /* === RESPONSIVE === */
    @media (max-width: 860px) {
      .superhero-scene {
        width: 100vw;
        height: 100vw;
        max-width: 600px;
        max-height: 600px;
      }
      .hero-photo-wrap { width: 160px; height: 160px; }
      .hero-photo { width: 160px; height: 160px; }
      .orbit-ring-1 { width: 300px; height: 300px; }
      .orbit-ring-2 { width: 400px; height: 400px; }
      .orbit-ring-3 { width: 520px; height: 520px; }
      .niche { font-size: 0.75rem; padding: 8px 12px; }
      .niche-icon { width: 28px; height: 28px; font-size: 14px; }
    }
  </style>
</head>
<body>

<div class="superhero-scene">

  <!-- Background energy -->
  <div class="energy-field"></div>

  <!-- Orbit rings -->
  <div class="orbit-ring orbit-ring-1"></div>
  <div class="orbit-ring orbit-ring-2"></div>
  <div class="orbit-ring orbit-ring-3"></div>

  <!-- Particles -->
  <div class="particles">
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
  </div>

  <!-- Energy beams SVG -->
  <svg class="energy-beams" viewBox="0 0 800 800" fill="none">
    <!-- Lines from center to each niche position -->
    <line x1="400" y1="400" x2="400" y2="80" class="beam" stroke="rgba(239,68,68,0.15)" stroke-width="1"/>
    <line x1="400" y1="400" x2="700" y2="180" class="beam" stroke="rgba(139,92,246,0.12)" stroke-width="1"/>
    <line x1="400" y1="400" x2="750" y2="400" class="beam" stroke="rgba(34,197,94,0.12)" stroke-width="1"/>
    <line x1="400" y1="400" x2="680" y2="600" class="beam" stroke="rgba(59,130,246,0.12)" stroke-width="1"/>
    <line x1="400" y1="400" x2="400" y2="720" class="beam" stroke="rgba(245,158,11,0.12)" stroke-width="1"/>
    <line x1="400" y1="400" x2="120" y2="600" class="beam" stroke="rgba(236,72,153,0.12)" stroke-width="1"/>
    <line x1="400" y1="400" x2="50" y2="400" class="beam" stroke="rgba(6,182,212,0.12)" stroke-width="1"/>
  </svg>

  <!-- Center photo -->
  <div class="hero-photo-wrap">
    <div class="hero-photo-glow"></div>
    <div class="hero-photo-ring"></div>
    <img src="rav-hero.jpg" alt="Rav Doctolero" class="hero-photo">

    <!-- Cape energy trail -->
    <div class="cape-energy">
      <div class="cape-streak cape-streak-1"></div>
      <div class="cape-streak cape-streak-2"></div>
      <div class="cape-streak cape-streak-3"></div>
    </div>
  </div>

  <!-- Floating niche cards -->

  <!-- Video Production -->
  <div class="niche niche-video">
    <div class="niche-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="23 7 16 12 23 17 23 7"/>
        <rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
      </svg>
    </div>
    Video Production
  </div>

  <!-- AI Creative -->
  <div class="niche niche-ai">
    <div class="niche-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#8b5cf6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2a4 4 0 0 1 4 4c0 1.95-1.4 3.58-3.25 3.93L12 22"/>
        <path d="M12 2a4 4 0 0 0-4 4c0 1.95 1.4 3.58 3.25 3.93"/>
        <path d="M9 13h6"/>
        <path d="M8 17h8"/>
        <path d="M10 21h4"/>
      </svg>
    </div>
    AI Creative
  </div>

  <!-- Automation -->
  <div class="niche niche-automation">
    <div class="niche-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2v4"/>
        <path d="M12 18v4"/>
        <path d="M4.93 4.93l2.83 2.83"/>
        <path d="M16.24 16.24l2.83 2.83"/>
        <path d="M2 12h4"/>
        <path d="M18 12h4"/>
        <path d="M4.93 19.07l2.83-2.83"/>
        <path d="M16.24 7.76l2.83-2.83"/>
      </svg>
    </div>
    Automation
  </div>

  <!-- Social Media -->
  <div class="niche niche-smm">
    <div class="niche-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
        <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        <path d="M2 8c0-3.31 2.69-6 6-6"/>
        <path d="M22 8c0-3.31-2.69-6-6-6"/>
      </svg>
    </div>
    Social Media
  </div>

  <!-- SEO -->
  <div class="niche niche-seo">
    <div class="niche-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        <line x1="8" y1="11" x2="14" y2="11"/>
        <line x1="11" y1="8" x2="11" y2="14"/>
      </svg>
    </div>
    SEO & Content
  </div>

  <!-- Graphic Design -->
  <div class="niche niche-design">
    <div class="niche-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#ec4899" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 19l7-7 3 3-7 7-3-3z"/>
        <path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/>
        <path d="M2 2l7.586 7.586"/>
        <circle cx="11" cy="11" r="2"/>
      </svg>
    </div>
    Graphic Design
  </div>

  <!-- AI Product Building -->
  <div class="niche niche-product">
    <div class="niche-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#06b6d4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="5" y="2" width="14" height="20" rx="2" ry="2"/>
        <line x1="12" y1="18" x2="12.01" y2="18"/>
      </svg>
    </div>
    AI Products
  </div>

  <!-- Name title -->
  <div class="hero-title-block">
    <div class="hero-name">Rav Doctolero</div>
    <div class="hero-tagline">AI-Powered Creative Operator</div>
  </div>

</div>

</body>
</html>
